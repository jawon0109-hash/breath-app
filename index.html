<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>breathe. pause. return.</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="숨">
<meta name="theme-color" content="#0a0c0f">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c0f; --surface: #161a20; --border: rgba(255,255,255,0.07);
    --text: #d4cfc8; --muted: #6b6660; --accent: #c8a97e; --white: #ede8e0;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Noto Serif KR', serif; font-weight: 300; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.5;
  }
  .glow-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .glow-orb.amber { width: 400px; height: 400px; background: rgba(200,169,126,0.07); top: -100px; right: -100px; }
  .glow-orb.blue  { width: 350px; height: 350px; background: rgba(126,184,200,0.05); bottom: -80px; left: -80px; }

  .screen {
    position: fixed; inset: 0; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 28px; opacity: 0; pointer-events: none; transition: opacity 0.9s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ── SPLASH ── */
  #screen-splash { background: #0a0c0f; z-index: 10; transition: opacity 1.2s ease; }
  .splash-words { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .splash-word {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 11vw, 4.2rem);
    font-weight: 300; font-style: italic; color: #c8a97e; letter-spacing: 0.1em;
    opacity: 0; transform: translateY(12px); transition: opacity 0.75s ease, transform 0.75s ease;
    line-height: 1.35;
  }
  .splash-word.visible { opacity: 1; transform: translateY(0); }

  /* ── HOME ── */
  .app-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--muted); letter-spacing: 0.14em; }
  .card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 22px; margin-bottom: 12px; }
  .card-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-option { flex: 1; min-width: 100px; position: relative; }
  .radio-option input { display: none; }
  .radio-option label {
    display: block; text-align: center; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 0.86rem; color: var(--muted); cursor: pointer;
    transition: all 0.25s; letter-spacing: 0.03em; user-select: none;
  }
  .radio-option input:checked + label { border-color: var(--accent); color: var(--accent); background: rgba(200,169,126,0.08); }
  .mood-group { gap: 8px; }
  .mood-option { min-width: calc(50% - 4px); flex: 1 1 calc(50% - 4px); }
  .btn-start {
    width: 100%; max-width: 420px; margin-top: 8px; padding: 18px;
    background: var(--accent); color: #1a1510; border: none; border-radius: 14px;
    font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 400;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s;
  }
  .btn-start:hover { background: #d4b88a; transform: translateY(-1px); box-shadow: 0 8px 30px rgba(200,169,126,0.25); }

  /* ── MEDITATION ── */
  .med-wrap { text-align: center; width: 100%; max-width: 420px; }
  .breath-ring {
    width: 220px; height: 220px; border-radius: 50%; border: 1px solid rgba(200,169,126,0.2);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 40px; position: relative;
  }
  .breath-ring::before, .breath-ring::after { content: ''; position: absolute; border-radius: 50%; }
  .breath-ring::before { inset: 18px; border: 1px solid rgba(200,169,126,0.12); }
  .breath-ring::after  { inset: 36px; background: radial-gradient(circle, rgba(200,169,126,0.12), transparent 70%); }
  .breath-ring.breathing { animation: breathe 8s ease-in-out infinite; }
  @keyframes breathe {
    0%,100% { transform: scale(1); box-shadow: none; }
    50% { transform: scale(1.12); box-shadow: 0 0 60px 20px rgba(200,169,126,0.06); }
  }
  .timer-display { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.2rem, 13vw, 5rem); font-weight: 300; color: var(--white); letter-spacing: 0.05em; line-height: 1; }
  .paused-label { font-size: 0.68rem; letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; min-height: 18px; }
  .guide-text {
    min-height: 90px; font-size: 1rem; color: var(--accent); letter-spacing: 0.05em;
    line-height: 1.9; font-style: italic; margin-bottom: 44px; opacity: 0;
    transition: opacity 1.2s ease; white-space: pre-line; text-align: center;
  }
  .guide-text.show { opacity: 1; }
  .btn-row { display: flex; gap: 12px; justify-content: center; }
  .btn-ghost {
    padding: 12px 26px; border: 1px solid var(--border); border-radius: 10px; background: transparent;
    color: var(--muted); font-family: 'Noto Serif KR', serif; font-size: 0.84rem; letter-spacing: 0.08em; cursor: pointer; transition: all 0.25s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .btn-ghost.danger:hover { border-color: rgba(200,100,80,0.4); color: #e88; }

  /* ── COMPLETION ── */
  .complete-wrap { text-align: center; width: 100%; max-width: 420px; }
  .bell-icon { font-size: 2.2rem; margin-bottom: 16px; color: var(--accent); animation: fadeUp 1s ease both; }
  .complete-title { font-family: 'DM Serif Display', serif; font-size: 1.55rem; color: var(--white); margin-bottom: 32px; animation: fadeUp 1s 0.2s ease both; }
  .divider { width: 100%; height: 1px; background: var(--border); margin: 0 0 26px; }
  .quote-block {
    background: var(--surface); border: 1px solid var(--border); border-left: 2px solid var(--accent);
    border-radius: 0 14px 14px 0; padding: 22px 24px; margin-bottom: 30px; text-align: left;
    animation: fadeUp 1s 0.4s ease both;
  }
  .quote-text { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--white); line-height: 1.7; margin-bottom: 10px; }
  .quote-source { font-size: 0.7rem; letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase; }
  .push-section { margin-bottom: 24px; animation: fadeUp 1s 0.6s ease both; }
  .push-label { font-size: 0.86rem; color: var(--muted); line-height: 1.7; margin-bottom: 14px; }
  .push-row { display: flex; gap: 10px; justify-content: center; }
  .btn-push {
    padding: 11px 30px; border-radius: 10px; border: 1px solid var(--border); background: transparent;
    font-family: 'Noto Serif KR', serif; font-size: 0.84rem; letter-spacing: 0.08em; cursor: pointer; color: var(--muted); transition: all 0.25s;
  }
  .btn-push.on:hover { background: rgba(200,169,126,0.12); border-color: var(--accent); color: var(--accent); }
  .btn-push.off:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .btn-push.selected-on { background: rgba(200,169,126,0.15); border-color: var(--accent); color: var(--accent); }
  .btn-push.selected-off { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: var(--text); }
  .btn-home {
    width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 12px;
    background: transparent; color: var(--text); font-family: 'Noto Serif KR', serif; font-size: 0.88rem;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; animation: fadeUp 1s 0.8s ease both;
  }
  .btn-home:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }

  /* ── CUSTOM ALERT (알림 대신 인앱 토스트) ── */
  .notify-toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.92);
    z-index: 100; width: min(360px, 90vw);
    background: var(--surface); border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 18px; padding: 32px 28px 24px;
    text-align: center; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .notify-toast.show { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
  .notify-toast-symbol { font-size: 1.8rem; color: var(--accent); margin-bottom: 14px; }
  .notify-toast-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--white); margin-bottom: 10px; }
  .notify-toast-body { font-size: 0.82rem; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }
  .notify-toast-time { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--accent); margin-bottom: 22px; letter-spacing: 0.08em; }
  .notify-toast-btn {
    width: 100%; padding: 13px; background: var(--accent); color: #1a1510;
    border: none; border-radius: 10px; font-family: 'Noto Serif KR', serif;
    font-size: 0.88rem; letter-spacing: 0.08em; cursor: pointer;
  }
  .notify-overlay {
    position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.55);
    opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  }
  .notify-overlay.show { opacity: 1; pointer-events: all; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="glow-orb amber"></div>
<div class="glow-orb blue"></div>

<!-- 알림 오버레이 & 토스트 -->
<div class="notify-overlay" id="notifyOverlay"></div>
<div class="notify-toast" id="notifyToast">
  <div class="notify-toast-symbol">✴</div>
  <div class="notify-toast-title">오늘의 명상 시간입니다</div>
  <div class="notify-toast-time" id="notifyTime"></div>
  <div class="notify-toast-body">잠시 멈추고 숨을 고르세요.<br>오늘도 당신만의 고요한 시간입니다.</div>
  <button class="notify-toast-btn" onclick="closeNotifyToast()">지금 시작하기</button>
</div>

<!-- ── SPLASH ── -->
<div class="screen active" id="screen-splash">
  <div class="splash-words">
    <span class="splash-word" id="sw-breathe">breathe.</span>
    <span class="splash-word" id="sw-pause">pause.</span>
    <span class="splash-word" id="sw-return">return.</span>
  </div>
</div>

<!-- ── HOME ── -->
<div class="screen" id="screen-home">
  <div style="margin-bottom:40px; text-align:center; padding-top:18px;">
    <div style="font-family:'DM Serif Display',serif; font-size:clamp(2.8rem,11vw,4.6rem); color:var(--accent); letter-spacing:0.18em; line-height:1; margin-bottom:10px;">숨</div>
    <div class="app-subtitle" style="font-size:1.15rem; margin-bottom:0; letter-spacing:0.18em; font-style:italic; font-weight:500; color:var(--muted);">breathe. pause. return.</div>
  </div>
  <div class="card">
    <div class="card-label">명상 시간</div>
    <div class="radio-group">
      <div class="radio-option"><input type="radio" name="duration" id="d30" value="30" checked><label for="d30">30분</label></div>
      <div class="radio-option"><input type="radio" name="duration" id="d60" value="60"><label for="d60">1시간</label></div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">가이드 방식</div>
    <div class="radio-group">
      <div class="radio-option"><input type="radio" name="guide" id="gVoice" value="voice" checked><label for="gVoice">음성</label></div>
      <div class="radio-option"><input type="radio" name="guide" id="gText" value="text"><label for="gText">텍스트</label></div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">오늘의 마음</div>
    <div class="radio-group mood-group">
      <div class="radio-option mood-option"><input type="radio" name="mood" id="m1" value="calm" checked><label for="m1">편안하게</label></div>
      <div class="radio-option mood-option"><input type="radio" name="mood" id="m2" value="joyful"><label for="m2">즐겁게</label></div>
      <div class="radio-option mood-option"><input type="radio" name="mood" id="m3" value="light"><label for="m3">가볍게</label></div>
      <div class="radio-option mood-option"><input type="radio" name="mood" id="m4" value="focus"><label for="m4">집중해서</label></div>
    </div>
  </div>
  <button class="btn-start" onclick="startMeditation()">시작</button>
  <div style="margin-top:20px; font-family:'Cormorant Garamond',serif; font-size:0.72rem; font-weight:500; font-style:italic; color:var(--accent); letter-spacing:0.18em; opacity:0.6; text-align:center;">
    Created by One Mind Project
  </div>
</div>

<!-- ── MEDITATION ── -->
<div class="screen" id="screen-med">
  <div class="med-wrap">
    <div class="breath-ring" id="breathRing">
      <div class="timer-display" id="timerDisplay">30:00</div>
    </div>
    <div class="paused-label" id="pausedLabel"></div>
    <div class="guide-text" id="guideText"></div>
    <div class="btn-row">
      <button class="btn-ghost" id="pauseBtn" onclick="togglePause()">일시 정지</button>
      <button class="btn-ghost danger" onclick="endMeditation()">명상 종료</button>
    </div>
  </div>
</div>

<!-- ── COMPLETION ── -->
<div class="screen" id="screen-done">
  <div class="complete-wrap">
    <div class="bell-icon">✴</div>
    <div class="complete-title">명상이 종료되었습니다</div>
    <div class="divider"></div>
    <div class="quote-block">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-source" id="quoteSource"></div>
    </div>
    <div class="push-section">
      <div class="push-label">매일 이 시간에 명상 알림을 받으시겠습니까?</div>
      <div class="push-row">
        <button class="btn-push on" id="pushOn" onclick="setPush(true)">알림 ON</button>
        <button class="btn-push off" id="pushOff" onclick="setPush(false)">OFF</button>
      </div>
    </div>
    <button class="btn-home" onclick="goHome()">홈으로 돌아가기</button>
  </div>
</div>

<script>
// ════════════════════════════
// SPLASH
// ════════════════════════════
window.addEventListener('load', () => {
  const steps = [
    { id: 'sw-breathe', delay: 400 },
    { id: 'sw-pause',   delay: 1400 },
    { id: 'sw-return',  delay: 2400 },
  ];
  steps.forEach(({ id, delay }) =>
    setTimeout(() => document.getElementById(id).classList.add('visible'), delay)
  );
  setTimeout(() => {
    const splash = document.getElementById('screen-splash');
    splash.style.opacity = '0';
    setTimeout(() => {
      splash.classList.remove('active');
      splash.style.display = 'none';
      showScreen('screen-home');
      checkScheduledNotification(); // 앱 열 때 예약 알림 확인
    }, 1200);
  }, 3800);
});

// ════════════════════════════
// QUOTES — 카테고리별 30개
// ════════════════════════════
const quotes = {
  calm: [
    { text: "고요함 속에서 우리는 진정한 자신을 발견한다.", source: "마르쿠스 아우렐리우스" },
    { text: "사물 그 자체로 돌아가라.", source: "에드문트 후설" },
    { text: "평화는 외부에서 얻는 것이 아니라, 내면에서 찾는 것이다.", source: "부처" },
    { text: "고요한 물은 깊이 흐른다.", source: "셰익스피어" },
    { text: "침묵은 신의 언어다. 그 외의 모든 것은 번역이다.", source: "루미" },
    { text: "내면의 고요함을 찾는 자는 이미 반쯤 도달한 것이다.", source: "노자" },
    { text: "바람이 없을 때 연못은 하늘을 담는다.", source: "선불교 격언" },
    { text: "생각을 내려놓는 순간, 존재가 시작된다.", source: "장자" },
    { text: "서두르지 마라. 조용히, 그러나 쉬지 말고.", source: "괴테" },
    { text: "편안함은 마음의 집이다.", source: "마르쿠스 아우렐리우스" },
    { text: "현재에 머무는 것이 가장 위대한 수행이다.", source: "틱낫한" },
    { text: "강은 서두르지 않아도 결국 바다에 닿는다.", source: "노자" },
    { text: "자신과 화해한 사람만이 세상과 화해할 수 있다.", source: "칼 융" },
    { text: "마음이 고요하면 모든 것이 제자리를 찾는다.", source: "장자" },
    { text: "숨 하나가 우리를 현재로 데려온다.", source: "틱낫한" },
    { text: "진정한 평화는 조건이 없다.", source: "지두 크리슈나무르티" },
    { text: "물처럼 흘러라. 막히면 돌아가고, 낮은 곳을 찾아 흘러라.", source: "노자" },
    { text: "소란스러운 세상에서 고요함은 혁명이다.", source: "마르쿠스 아우렐리우스" },
    { text: "내면이 고요할 때 비로소 진리가 들린다.", source: "소크라테스" },
    { text: "지금 이 순간은 언제나 충분하다.", source: "에크하르트 톨레" },
    { text: "깊은 강은 소리 없이 흐른다.", source: "한국 속담" },
    { text: "피로는 마음에서 온다. 몸은 그것을 따를 뿐이다.", source: "윌리엄 제임스" },
    { text: "고요히 앉아 있는 것이 때로는 최선의 행동이다.", source: "파스칼" },
    { text: "바다는 파도에 흔들려도 깊이는 변하지 않는다.", source: "선불교 격언" },
    { text: "폭풍의 한가운데에도 고요한 눈이 있다.", source: "에크하르트 톨레" },
    { text: "쉬는 것도 용기다.", source: "어니스트 헤밍웨이" },
    { text: "당신의 고요함이 세상을 변화시킨다.", source: "라마나 마하리쉬" },
    { text: "평온함은 나약함이 아니라 내면의 힘이다.", source: "마르쿠스 아우렐리우스" },
    { text: "고요 속에 모든 답이 있다.", source: "소크라테스" },
    { text: "멈추는 것이 때로는 가장 빠른 길이다.", source: "노자" },
  ],
  joyful: [
    { text: "기쁨은 삶의 의미이자 목적, 인간 존재의 온전한 목표다.", source: "아리스토텔레스" },
    { text: "행복은 습관이다. 그것을 몸에 지녀라.", source: "엘버트 허버드" },

// ════════════════════════════
// 알림 예약 — setTimeout 단일 체인 방식
// setInterval 폴링 없이, 다음 알림까지 정확한 ms를 계산해
// setTimeout 하나만 걸고, 발화 후 다음날 것을 자동 재예약
// ════════════════════════════
const NOTIF_KEY = 'breath_notify_time'; // "HH:MM" 저장
let notifyTimer = null; // 현재 예약된 setTimeout ID

function saveNotifyTime(hhmm) { localStorage.setItem(NOTIF_KEY, hhmm); }
function loadNotifyTime()      { return localStorage.getItem(NOTIF_KEY); }
function clearNotifyTime()     { localStorage.removeItem(NOTIF_KEY); }

/**
 * "HH:MM" 기준으로 오늘 또는 내일 해당 시각까지 남은 ms 계산
 */
function msUntilNext(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1); // 이미 지났으면 내일로
  return next - now;
}

/**
 * 알림 스케줄러 시작
 * - 기존 타이머 있으면 취소 후 새로 등록
 * - 발화 후 24시간 뒤(=다음날 같은 시각)에 자동 재예약
 */
function checkScheduledNotification() {
  const hhmm = loadNotifyTime();
  if (!hhmm) return;
  scheduleNextNotify(hhmm);
}

function scheduleNextNotify(hhmm) {
  if (notifyTimer) clearTimeout(notifyTimer);

  const delay = msUntilNext(hhmm);

  notifyTimer = setTimeout(() => {
    showNotifyToast(hhmm);
    scheduleNextNotify(hhmm); // 발화 후 다음날 동일 시각으로 자동 재예약
  }, delay);
}

function showNotifyToast(hhmm) {
  document.getElementById('notifyTime').textContent = hhmm;
  document.getElementById('notifyOverlay').classList.add('show');
  document.getElementById('notifyToast').classList.add('show');
}

function closeNotifyToast() {
  document.getElementById('notifyOverlay').classList.remove('show');
  document.getElementById('notifyToast').classList.remove('show');
}

// ════════════════════════════
// WAKE LOCK
// ════════════════════════════
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
function releaseWakeLock() {
  if (wakeLock) wakeLock.release().then(() => wakeLock = null);
}

// ════════════════════════════
// AUDIO UNLOCK
// ════════════════════════════
function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  if (synth) { const u = new SpeechSynthesisUtterance(''); u.volume = 0; synth.speak(u); }
}

// ════════════════════════════
// NAVIGATION
// ════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() { stopAll(); showScreen('screen-home'); }

// ════════════════════════════
// MEDITATION
// ════════════════════════════
function startMeditation() {
  unlockAudio();
  requestWakeLock();
  const dur = parseInt(document.querySelector('input[name="duration"]:checked').value);
  guideMode    = document.querySelector('input[name="guide"]:checked').value;
  selectedMood = document.querySelector('input[name="mood"]:checked').value;
  remaining = dur * 60; isPaused = false; guideIndex = 0;
  expectedEndTime = Date.now() + remaining * 1000;
  updateTimer();
  showScreen('screen-med');
  document.getElementById('breathRing').classList.add('breathing');
  document.getElementById('pausedLabel').textContent = '';
  document.getElementById('pauseBtn').textContent = '일시 정지';
  interval = setInterval(tick, 1000);
  scheduleGuide();
}

function tick() {
  if (isPaused) return;
  remaining = Math.round((expectedEndTime - Date.now()) / 1000);
  if (remaining <= 0) { remaining = 0; updateTimer(); endMeditation(); }
  else updateTimer();
}

function updateTimer() {
  const m = Math.floor(remaining / 60).toString().padStart(2, '0');
  const s = (remaining % 60).toString().padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
}

function scheduleGuide() {
  setTimeout(() => {
    if (guideMode === 'voice') {
      playVoiceScript();
    } else {
      runSegment(0);
    }
  }, 5000);
}

// 음성 모드 — 각 문장을 읽고 정확한 ms 쉰 뒤 다음 문장으로
function playVoiceScript(index = 0) {
  if (isPaused || index >= voiceSegments.length) return;
  if (!synth) return;

  guideIndex = index; // 현재 위치 기록 (일시정지 재개용)
  const seg = voiceSegments[index];
  synth.cancel();

  const utt = new SpeechSynthesisUtterance(seg.text);
  utt.lang  = 'ko-KR';
  utt.rate  = 0.82;
  utt.pitch = 0.93;

  utt.onend = () => {
    if (!isPaused) {
      guideInterval = setTimeout(() => playVoiceScript(index + 1), seg.pause);
    }
  };

  synth.speak(utt);
}

// 텍스트 모드 — 세그먼트별로 순차 표시
function runSegment(index) {
  if (isPaused || index >= guideSegments.length) return;

  guideIndex = index + 1;
  const seg = guideSegments[index];
  const el  = document.getElementById('guideText');

  el.classList.remove('show');
  setTimeout(() => { el.textContent = seg.text; el.classList.add('show'); }, 400);

  guideInterval = setTimeout(() => runSegment(index + 1), seg.pause);
}

function togglePause() {
  isPaused = !isPaused;
  const ring = document.getElementById('breathRing');
  if (isPaused) {
    document.getElementById('pauseBtn').textContent = '계속하기';
    document.getElementById('pausedLabel').textContent = '· 일시정지 중 ·';
    ring.classList.remove('breathing');
    if (synth) synth.cancel();
    if (guideInterval) { clearTimeout(guideInterval); guideInterval = null; }
  } else {
    expectedEndTime = Date.now() + remaining * 1000;
    document.getElementById('pauseBtn').textContent = '일시 정지';
    document.getElementById('pausedLabel').textContent = '';
    ring.classList.add('breathing');
    if (guideMode === 'voice') {
      playVoiceScript(guideIndex); // 멈춘 문장부터 이어서
    } else {
      runSegment(guideIndex);
    }
  }
}

function endMeditation() {
  stopAll();
  // 싱잉볼 사운드
  try {
    const now = audioCtx.currentTime;
    [{ freq:432, gain:0.28, decay:5.0 }, { freq:864, gain:0.12, decay:3.5 }, { freq:1296, gain:0.06, decay:2.5 }, { freq:1728, gain:0.03, decay:1.8 }]
    .forEach(({ freq, gain: g, decay }) => {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 4.5; lfoG.gain.value = 1.2;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      osc.connect(env); env.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now);
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(g, now + 0.02);
      env.gain.exponentialRampToValueAtTime(0.0001, now + decay);
      lfo.start(now); lfo.stop(now + decay);
      osc.start(now); osc.stop(now + decay);
    });
  } catch(e) {}
  const pool = quotes[selectedMood] || quotes.calm;
  const q = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('quoteText').textContent  = `"${q.text}"`;
  document.getElementById('quoteSource').textContent = `— ${q.source}`;
  document.getElementById('pushOn').className  = 'btn-push on';
  document.getElementById('pushOff').className = 'btn-push off';
  showScreen('screen-done');
}

function stopAll() {
  clearInterval(interval);
  if (guideInterval) { clearTimeout(guideInterval); guideInterval = null; }
  releaseWakeLock();
  if (synth) synth.cancel();
  document.getElementById('breathRing').classList.remove('breathing');
  const el = document.getElementById('guideText');
  el.classList.remove('show'); el.textContent = '';
  guideIndex = 0;
}

// ════════════════════════════
// 알림 설정
// ════════════════════════════
function setPush(on) {
  document.getElementById('pushOn').className  = 'btn-push on'  + (on  ? ' selected-on'  : '');
  document.getElementById('pushOff').className = 'btn-push off' + (!on ? ' selected-off' : '');

  if (on) {
    const now = new Date();
    const hhmm = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    saveNotifyTime(hhmm);
    scheduleNextNotify(hhmm); // setTimeout 단 1회 등록
    showSaveConfirm(hhmm);
  } else {
    clearNotifyTime();
    if (notifyTimer) { clearTimeout(notifyTimer); notifyTimer = null; }
    showSaveConfirm(null);
  }
}

function showSaveConfirm(hhmm) {
  const section = document.querySelector('.push-section');
  let msg = section.querySelector('.push-confirm');
  if (!msg) {
    msg = document.createElement('div');
    msg.className = 'push-confirm';
    msg.style.cssText = 'font-size:0.75rem; color:var(--accent); margin-top:12px; letter-spacing:0.06em; opacity:0; transition:opacity 0.4s;';
    section.appendChild(msg);
  }
  msg.textContent = hhmm
    ? `매일 ${hhmm}에 알림이 설정되었습니다`
    : '알림이 해제되었습니다';
  setTimeout(() => msg.style.opacity = '1', 10);
  setTimeout(() => msg.style.opacity = '0', 3000);
}

// ════════════════════════════
// SERVICE WORKER 등록 (PWA)
// 로컬 서버 또는 실제 배포 환경에서만 등록 시도
// ════════════════════════════
if ('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] 등록 완료:', reg.scope))
      .catch(err => console.log('[SW] 등록 실패:', err));
  });
}
