<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>breathe. pause. return.</title>

<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="숨">
<meta name="theme-color" content="#0a0c0f">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #161a20;
    --border: rgba(255,255,255,0.07);
    --text: #d4cfc8;
    --muted: #6b6660;
    --accent: #c8a97e;
    --white: #ede8e0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb.amber {
    width: 400px;
    height: 400px;
    background: rgba(200,169,126,0.07);
    top: -100px;
    right: -100px;
  }
  .glow-orb.blue  {
    width: 350px;
    height: 350px;
    background: rgba(126,184,200,0.05);
    bottom: -80px;
    left: -80px;
  }

  .screen {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    padding-top: calc(40px + env(safe-area-inset-top));
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ── SPLASH ── */
  #screen-splash {
    background: #0a0c0f;
    z-index: 10;
    transition: opacity 1.2s ease;
  }

  .splash-words {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .splash-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 11vw, 4.2rem);
    font-weight: 300;
    font-style: italic;
    color: #c8a97e;
    letter-spacing: 0.1em;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.75s ease, transform 0.75s ease;
    line-height: 1.35;
  }
  .splash-word.visible { opacity: 1; transform: translateY(0); }

  /* ── HOME ── */
  .app-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.14em;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 22px;
    margin-bottom: 12px;
  }

  .card-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .radio-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .radio-option {
    flex: 1;
    min-width: 100px;
    position: relative;
  }

  .radio-option input { display: none; }

  .radio-option label {
    display: block;
    text-align: center;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.86rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.03em;
    user-select: none;
  }

  .radio-option input:checked + label {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,126,0.08);
  }

  .mood-group { gap: 8px; }
  .mood-option {
    min-width: calc(50% - 4px);
    flex: 1 1 calc(50% - 4px);
  }

  .btn-start {
    width: 100%;
    max-width: 420px;
    margin-top: 8px;
    padding: 18px;
    background: var(--accent);
    color: #1a1510;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-start:hover {
    background: #d4b88a;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(200,169,126,0.25);
  }

  /* ── MEDITATION ── */
  .med-wrap {
    text-align: center;
    width: 100%;
    max-width: 420px;
  }

  .breath-ring {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 1px solid rgba(200,169,126,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 40px;
    position: relative;
  }

  .breath-ring::before,
  .breath-ring::after {
    content: '';
    position: absolute;
    border-radius: 50%;
  }

  .breath-ring::before {
    inset: 18px;
    border: 1px solid rgba(200,169,126,0.12);
  }

  .breath-ring::after {
    inset: 36px;
    background: radial-gradient(circle, rgba(200,169,126,0.12), transparent 70%);
  }

  .breath-ring.breathing { animation: breathe 8s ease-in-out infinite; }

  @keyframes breathe {
    0%,100% { transform: scale(1); box-shadow: none; }
    50% { transform: scale(1.12); box-shadow: 0 0 60px 20px rgba(200,169,126,0.06); }
  }

  .timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 13vw, 5rem);
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .paused-label {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    min-height: 18px;
  }

  .guide-text {
    min-height: 90px;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    line-height: 1.9;
    font-style: italic;
    margin-bottom: 44px;
    opacity: 0;
    transition: opacity 1.2s ease;
    white-space: pre-line;
    text-align: center;
  }

  .guide-text.show { opacity: 1; }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn-ghost {
    padding: 12px 26px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.84rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  .btn-ghost.danger:hover {
    border-color: rgba(200,100,80,0.4);
    color: #e88;
  }

  /* ── COMPLETION ── */
  .complete-wrap {
    text-align: center;
    width: 100%;
    max-width: 420px;
  }

  .bell-icon {
    font-size: 2.2rem;
    margin-bottom: 16px;
    color: var(--accent);
    animation: fadeUp 1s ease both;
  }

  .complete-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.55rem;
    color: var(--white);
    margin-bottom: 32px;
    animation: fadeUp 1s 0.2s ease both;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0 0 26px;
  }

  .quote-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 0 14px 14px 0;
    padding: 22px 24px;
    margin-bottom: 30px;
    text-align: left;
    animation: fadeUp 1s 0.4s ease both;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: var(--white);
    line-height: 1.7;
    margin-bottom: 10px;
  }

  .quote-source {
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    color: var(--muted);
  }

  .push-section {
    margin-bottom: 24px;
    animation: fadeUp 1s 0.6s ease both;
  }

  .push-label {
    font-size: 0.86rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  .push-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn-push {
    padding: 11px 30px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.84rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.25s;
  }

  .btn-push.on:hover {
    background: rgba(200,169,126,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-push.off:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text);
  }

  .btn-push.selected-on {
    background: rgba(200,169,126,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-push.selected-off {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .btn-home {
    width: 100%;
    padding: 15px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.3s;
    animation: fadeUp 1s 0.8s ease both;
  }

  .btn-home:hover {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
  }

  /* ── CUSTOM ALERT ── */
  .notify-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    z-index: 100;
    width: min(360px, 90vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 18px;
    padding: 32px 28px 24px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }

  .notify-toast.show {
    opacity: 1;
    pointer-events: all;
    transform: translate(-50%, -50%) scale(1);
  }

  .notify-toast-symbol {
    font-size: 1.8rem;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .notify-toast-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--white);
    margin-bottom: 10px;
  }

  .notify-toast-body {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.75;
    margin-bottom: 22px;
  }

  .notify-toast-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 22px;
    letter-spacing: 0.08em;
  }

  .notify-toast-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #1a1510;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  .notify-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
    background: rgba(0,0,0,0.55);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .notify-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="glow-orb amber"></div>
<div class="glow-orb blue"></div>

<div class="notify-overlay" id="notifyOverlay"></div>
<div class="notify-toast" id="notifyToast">
  <div class="notify-toast-symbol">
    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1L14.5 8.5L22 11L14.5 13.5L12 21L9.5 13.5L2 11L9.5 8.5L12 1Z"/>
    </svg>
  </div>
  <div class="notify-toast-title" id="notifyToastTitle">오늘의 명상 시간입니다</div>
  <div class="notify-toast-time" id="notifyTime"></div>
  <div class="notify-toast-body" id="notifyToastBody">잠시 멈추고 숨을 고르세요.<br>오늘도 당신만의 고요한 시간입니다.</div>
  <button class="notify-toast-btn" id="notifyToastBtn" onclick="closeNotifyToast()">확인</button>
</div>

<div class="screen active" id="screen-splash">
  <div class="splash-words">
    <span class="splash-word" id="sw-breathe">breathe.</span>
    <span class="splash-word" id="sw-pause">pause.</span>
    <span class="splash-word" id="sw-return">return.</span>
  </div>
</div>

<div class="screen" id="screen-home">
  <div style="margin-bottom:40px; text-align:center; padding-top:18px;">
    <div style="font-family:'DM Serif Display',serif; font-size:clamp(2.8rem,11vw,4.6rem); color:var(--accent); letter-spacing:0.18em; line-height:1; margin-bottom:10px;">숨</div>
    <div class="app-subtitle" style="font-size:1.15rem; margin-bottom:0; letter-spacing:0.18em; font-style:italic; font-weight:500; color:var(--muted);">breathe. pause. return.</div>
  </div>

  <div class="card">
    <div class="card-label" id="label-duration">호흡 시간</div>
    <div class="radio-group">
      <div class="radio-option">
        <input type="radio" name="duration" id="d30" value="30" checked>
        <label for="d30" id="label-30">30분</label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label" id="label-guide">가이드 방식</div>
    <div class="radio-group">
      <div class="radio-option">
        <input type="radio" name="guide" id="gVoice" value="voice" checked>
        <label for="gVoice" id="label-voice">음성</label>
      </div>
      <div class="radio-option">
        <input type="radio" name="guide" id="gText" value="text">
        <label for="gText" id="label-text">텍스트</label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label" id="label-lang">언어</div>
    <div class="radio-group mood-group">
      <div class="radio-option mood-option">
        <input type="radio" name="lang" id="l1" value="ko" checked>
        <label for="l1">한국어</label>
      </div>
      <div class="radio-option mood-option">
        <input type="radio" name="lang" id="l2" value="ja">
        <label for="l2">日本語</label>
      </div>
      <div class="radio-option mood-option">
        <input type="radio" name="lang" id="l3" value="zh">
        <label for="l3">中文</label>
      </div>
      <div class="radio-option mood-option">
        <input type="radio" name="lang" id="l4" value="en">
        <label for="l4">English</label>
      </div>
    </div>
  </div>

  <button class="btn-start" id="btn-start" onclick="startMeditation()">시작</button>

  <div style="margin-top:16px; text-align:center;">
    <div id="label-disclaimer" style="font-family:'Cormorant Garamond',serif; font-size:0.74rem; font-weight:500; font-style:italic; color:var(--accent); letter-spacing:0.1em; opacity:0.55; margin-bottom:6px;">
      * 의학적 목적이 아니니 불편하면 중단해주세요. *
    </div>
    <div style="font-family:'Cormorant Garamond',serif; font-size:0.72rem; font-weight:500; font-style:italic; color:var(--accent); letter-spacing:0.18em; opacity:0.45;">
      Created by One Mind
    </div>
  </div>
</div>

<div class="screen" id="screen-med">
  <div class="med-wrap">
    <div class="breath-ring" id="breathRing">
      <div class="timer-display" id="timerDisplay">30:00</div>
    </div>
    <div class="paused-label" id="pausedLabel"></div>
    <div class="guide-text" id="guideText"></div>
    <div class="btn-row">
      <button class="btn-ghost" id="pauseBtn" onclick="togglePause()">일시 정지</button>
      <button class="btn-ghost danger" id="endBtn" onclick="endMeditation()">명상 종료</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-done">
  <div class="complete-wrap">
    <div class="bell-icon">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1L14.5 8.5L22 11L14.5 13.5L12 21L9.5 13.5L2 11L9.5 8.5L12 1Z"/>
      </svg>
    </div>
    <div class="complete-title" id="complete-title">명상이 종료되었습니다</div>
    <div class="divider"></div>
    <div class="quote-block">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-source" id="quoteSource"></div>
    </div>
    <div class="push-section">
      <div class="push-label" id="push-label">매일 이 시간에 명상 알림을 받으시겠습니까?</div>
      <div class="push-row">
        <button class="btn-push on" id="pushOn" onclick="setPush(true)">알림 ON</button>
        <button class="btn-push off" id="pushOff" onclick="setPush(false)">OFF</button>
      </div>
    </div>
    <button class="btn-home" id="btn-home" onclick="goHome()">홈으로 돌아가기</button>
  </div>
</div>

<script>
// ════════════════════════════
// SPLASH
// ════════════════════════════
window.addEventListener('load', () => {
  const steps = [
    { id: 'sw-breathe', delay: 400 },
    { id: 'sw-pause',   delay: 1400 },
    { id: 'sw-return',  delay: 2400 },
  ];

  steps.forEach(({ id, delay }) => {
    setTimeout(() => document.getElementById(id).classList.add('visible'), delay);
  });

  setTimeout(() => {
    const splash = document.getElementById('screen-splash');
    splash.style.opacity = '0';

    setTimeout(() => {
      splash.classList.remove('active');
      splash.style.display = 'none';
      showScreen('screen-home');
      checkScheduledNotification();
    }, 1200);
  }, 3800);
});

// ════════════════════════════
// QUOTES — 언어별 30개
// ════════════════════════════
const quotesAll = {
  ko: [
    { text: "고요함 속에서 우리는 진정한 자신을 발견한다.", source: "마르쿠스 아우렐리우스" },
    { text: "사물 그 자체로 돌아가라.", source: "에드문트 후설" },
    { text: "평화는 외부에서 얻는 것이 아니라, 내면에서 찾는 것이다.", source: "부처" },
    { text: "침묵은 신의 언어다. 그 외의 모든 것은 번역이다.", source: "루미" },
    { text: "생각을 내려놓는 순간, 존재가 시작된다.", source: "장자" },
    { text: "현재에 머무는 것이 가장 위대한 수행이다.", source: "틱낫한" },
    { text: "강은 서두르지 않아도 결국 바다에 닿는다.", source: "노자" },
    { text: "마음이 고요하면 모든 것이 제자리를 찾는다.", source: "장자" },
    { text: "물처럼 흘러라. 막히면 돌아가고, 낮은 곳을 찾아 흘러라.", source: "노자" },

let guideSegments = guideSegmentsAll.ko;

// ════════════════════════════
// STATE
// ════════════════════════════
let remaining, interval, guideInterval, expectedEndTime;
let isPaused = false;
let guideMode = 'voice';
let selectedLang = 'ko';
let guideIndex = 0;
let guideStarted = false;
let audioCtx = null;
let wakeLock = null;
const synth = window.speechSynthesis;

// ════════════════════════════
// I18N HELPERS
// ════════════════════════════
function updateNotifyTexts(lang) {
  const t = i18n[lang] || i18n.ko;
  document.getElementById('notifyToastTitle').textContent = t.notifyTitle;
  document.getElementById('notifyToastBody').innerHTML = t.notifyBody;
  document.getElementById('notifyToastBtn').textContent = t.notifyButton;
}

function formatInspiredSource(source, lang) {
  const t = i18n[lang] || i18n.ko;
  return `— ${t.inspiredBy(source)}`;
}

function applyLang(lang) {
  selectedLang = lang;
  document.documentElement.lang = lang;

  const t = i18n[lang];
  document.getElementById('label-duration').textContent = t.duration;
  document.getElementById('label-30').textContent = t.min30;
  document.getElementById('label-guide').textContent = t.guide;
  document.getElementById('label-voice').textContent = t.voice;
  document.getElementById('label-text').textContent = t.text;
  document.getElementById('label-lang').textContent = t.langLabel;
  document.getElementById('btn-start').textContent = t.start;
  document.getElementById('label-disclaimer').textContent = t.disclaimer;

  updateNotifyTexts(lang);

  guideSegments = guideSegmentsAll[lang];
  voiceSegments = voiceSegmentsAll[lang];
}

document.querySelectorAll('input[name="lang"]').forEach(el => {
  el.addEventListener('change', e => applyLang(e.target.value));
});

applyLang(selectedLang);

// ════════════════════════════
// 알림 예약 — setTimeout 단일 체인 방식
// ════════════════════════════
const NOTIF_KEY = 'breath_notify_time';
let notifyTimer = null;

function saveNotifyTime(hhmm) { localStorage.setItem(NOTIF_KEY, hhmm); }
function loadNotifyTime() { return localStorage.getItem(NOTIF_KEY); }
function clearNotifyTime() { localStorage.removeItem(NOTIF_KEY); }

function msUntilNext(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const now = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  return next - now;
}

function checkScheduledNotification() {
  const hhmm = loadNotifyTime();
  if (!hhmm) return;
  scheduleNextNotify(hhmm);
}

function scheduleNextNotify(hhmm) {
  if (notifyTimer) clearTimeout(notifyTimer);

  const delay = msUntilNext(hhmm);
  notifyTimer = setTimeout(() => {
    showNotifyToast(hhmm);
    scheduleNextNotify(hhmm);
  }, delay);
}

function showNotifyToast(hhmm) {
  updateNotifyTexts(selectedLang);
  document.getElementById('notifyTime').textContent = hhmm;
  document.getElementById('notifyOverlay').classList.add('show');
  document.getElementById('notifyToast').classList.add('show');
}

function closeNotifyToast() {
  document.getElementById('notifyOverlay').classList.remove('show');
  document.getElementById('notifyToast').classList.remove('show');
}

// ════════════════════════════
// WAKE LOCK
// ════════════════════════════
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}

function releaseWakeLock() {
  if (wakeLock) wakeLock.release().then(() => wakeLock = null);
}

// ════════════════════════════
// AUDIO UNLOCK
// ════════════════════════════
function unlockAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === 'suspended') audioCtx.resume();

  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);

  if (synth) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    synth.speak(u);
  }
}

// ════════════════════════════
// NAVIGATION
// ════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopAll();
  showScreen('screen-home');
}

// ════════════════════════════
// MEDITATION
// ════════════════════════════
function startMeditation() {
  unlockAudio();
  requestWakeLock();

  const dur = 30;
  guideMode = document.querySelector('input[name="guide"]:checked').value;
  selectedLang = document.querySelector('input[name="lang"]:checked').value;
  document.documentElement.lang = selectedLang;

  guideSegments = guideSegmentsAll[selectedLang];
  voiceSegments = voiceSegmentsAll[selectedLang];

  remaining = dur * 60;
  isPaused = false;
  guideIndex = 0;
  guideStarted = false;
  expectedEndTime = Date.now() + remaining * 1000;

  updateTimer();
  showScreen('screen-med');

  const t = i18n[selectedLang];
  document.getElementById('breathRing').classList.add('breathing');
  document.getElementById('pausedLabel').textContent = '';
  document.getElementById('pauseBtn').textContent = t.pause;
  document.getElementById('endBtn').textContent = t.end;

  interval = setInterval(tick, 1000);
  scheduleGuide();
}

function tick() {
  if (isPaused) return;

  remaining = Math.round((expectedEndTime - Date.now()) / 1000);

  if (remaining <= 0) {
    remaining = 0;
    updateTimer();
    endMeditation();
  } else {
    updateTimer();
  }
}

function updateTimer() {
  const m = Math.floor(remaining / 60).toString().padStart(2, '0');
  const s = (remaining % 60).toString().padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
}

function scheduleGuide() {
  if (guideInterval) {
    clearTimeout(guideInterval);
    guideInterval = null;
  }

  guideInterval = setTimeout(() => {
    guideInterval = null;
    if (isPaused) return;

    guideStarted = true;

    if (guideMode === 'voice') {
      playVoiceScript(0);
    } else {
      runSegment(0);
    }
  }, 5000);
}

function playVoiceScript(index = 0) {
  if (isPaused || index >= voiceSegments.length) return;
  if (!synth) return;

  guideStarted = true;
  guideIndex = index;

  const seg = voiceSegments[index];
  const lang = i18n[selectedLang].ttsLang;
  const rate = i18n[selectedLang].ttsRate;

  synth.cancel();

  const utt = new SpeechSynthesisUtterance(seg.text);
  utt.lang = lang;
  utt.rate = rate;
  utt.pitch = 0.93;

  utt.onend = () => {
    if (isPaused) return;

    guideIndex = index + 1;
    guideInterval = setTimeout(() => {
      playVoiceScript(index + 1);
    }, seg.pause);
  };

  synth.speak(utt);
}

function runSegment(index) {
  if (isPaused || index >= guideSegments.length) return;

  guideStarted = true;
  guideIndex = index;

  const seg = guideSegments[index];
  const el = document.getElementById('guideText');

  el.classList.remove('show');
  el.textContent = seg.text;
  void el.offsetWidth;
  el.classList.add('show');

  guideInterval = setTimeout(() => {
    guideIndex = index + 1;
    runSegment(index + 1);
  }, seg.pause);
}

function togglePause() {
  isPaused = !isPaused;
  const t = i18n[selectedLang];
  const ring = document.getElementById('breathRing');

  if (guideInterval) {
    clearTimeout(guideInterval);
    guideInterval = null;
  }

  if (isPaused) {
    document.getElementById('pauseBtn').textContent = t.resume;
    document.getElementById('pausedLabel').textContent = t.pausing;
    ring.classList.remove('breathing');

    if (synth) synth.cancel();
    return;
  }

  expectedEndTime = Date.now() + remaining * 1000;
  document.getElementById('pauseBtn').textContent = t.pause;
  document.getElementById('pausedLabel').textContent = '';
  ring.classList.add('breathing');

  if (!guideStarted) {
    scheduleGuide();
  } else if (guideMode === 'voice') {
    playVoiceScript(guideIndex);
  } else {
    runSegment(guideIndex);
  }
}

function endMeditation() {
  stopAll();

  try {
    const now = audioCtx.currentTime;
    [
      { freq: 432,  gain: 0.28, decay: 5.0 },
      { freq: 864,  gain: 0.12, decay: 3.5 },
      { freq: 1296, gain: 0.06, decay: 2.5 },
      { freq: 1728, gain: 0.03, decay: 1.8 }
    ].forEach(({ freq, gain: g, decay }) => {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();

      lfo.frequency.value = 4.5;
      lfoG.gain.value = 1.2;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);

      osc.connect(env);
      env.connect(audioCtx.destination);

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);

      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(g, now + 0.02);
      env.gain.exponentialRampToValueAtTime(0.0001, now + decay);

      lfo.start(now);
      lfo.stop(now + decay);
      osc.start(now);
      osc.stop(now + decay);
    });
  } catch (e) {}

  const pool = quotesAll[selectedLang] || quotesAll.ko;
  const q = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById('quoteText').textContent = q.text;
  document.getElementById('quoteSource').textContent = formatInspiredSource(q.source, selectedLang);

  const t = i18n[selectedLang];
  document.getElementById('complete-title').textContent = t.complete;
  document.getElementById('push-label').textContent = t.pushLabel;
  document.getElementById('pushOn').textContent = t.pushOn;
  document.getElementById('pushOff').textContent = t.pushOff;
  document.getElementById('btn-home').textContent = t.home;
  document.getElementById('pushOn').className = 'btn-push on';
  document.getElementById('pushOff').className = 'btn-push off';

  showScreen('screen-done');
}

function stopAll() {
  clearInterval(interval);
  interval = null;

  if (guideInterval) {
    clearTimeout(guideInterval);
    guideInterval = null;
  }

  guideStarted = false;
  isPaused = false;

  releaseWakeLock();

  if (synth) synth.cancel();

  document.getElementById('breathRing').classList.remove('breathing');
  document.getElementById('pausedLabel').textContent = '';

  const el = document.getElementById('guideText');
  el.classList.remove('show');
  el.textContent = '';

  guideIndex = 0;
}

// ════════════════════════════
// 알림 설정
// ════════════════════════════
function setPush(on) {
  document.getElementById('pushOn').className = 'btn-push on' + (on ? ' selected-on' : '');
  document.getElementById('pushOff').className = 'btn-push off' + (!on ? ' selected-off' : '');

  if (on) {
    const now = new Date();
    const hhmm = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    saveNotifyTime(hhmm);
    scheduleNextNotify(hhmm);
    showSaveConfirm(hhmm);
  } else {
    clearNotifyTime();
    if (notifyTimer) {
      clearTimeout(notifyTimer);
      notifyTimer = null;
    }
    showSaveConfirm(null);
  }
}

function showSaveConfirm(hhmm) {
  const section = document.querySelector('.push-section');
  const t = i18n[selectedLang] || i18n.ko;

  let msg = section.querySelector('.push-confirm');
  if (!msg) {
    msg = document.createElement('div');
    msg.className = 'push-confirm';
    msg.style.cssText = 'font-size:0.75rem; color:var(--accent); margin-top:12px; letter-spacing:0.06em; opacity:0; transition:opacity 0.4s;';
    section.appendChild(msg);
  }

  msg.textContent = hhmm ? t.notifySet(hhmm) : t.notifyUnset;

  setTimeout(() => msg.style.opacity = '1', 10);
  setTimeout(() => msg.style.opacity = '0', 3000);
}

  'serviceWorker' in navigator &&
  (location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(location.hostname));

if (canRegisterSW) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] 등록 완료:', reg.scope))
      .catch(err => console.log('[SW] 등록 실패:', err));
  });
}
